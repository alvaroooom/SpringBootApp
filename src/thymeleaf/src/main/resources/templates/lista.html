<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <table border="1">
		<tr th:if="${listaProductos.size() == 0}">
			<div class="alert alert-warning">
				No hay productos aún
			</div>
		</tr>
		<div th:unless="${listaProductos.isEmpty()}">
			<tr th:each = "producto : ${listaProductos}">
				<td><span th:text="${producto.nombre}"></span></td>
				<td><span th:text="${producto.precio}"></span></td>
				<td><span th:text="${producto.categoria}"></span></td>
			</tr>
		</div>
    </table>
</body>
</html>
